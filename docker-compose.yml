services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aquasense_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:///./data/aquasense.db
      DEBUG: "false"
    volumes:
      - ./backend/data:/app/data        # ← host folder, DB persists on YOUR machine
      - ./backend/models:/app/models    # ← models persist too
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  frontend:
    image: nginx:alpine
    container_name: aquasense_frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend/public:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

